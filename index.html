<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کار و کاسبی | سامانه امتیازدهی و نظرسنجی مغازه (کد QR)</title>
    <!-- Elegant Persian font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
      /* Custom print styling for the QR poster */
      @media print {
        body * {
          visibility: hidden;
        }
        #printable-qr-poster, #printable-qr-poster * {
          visibility: visible;
        }
        #printable-qr-poster {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          display: block !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased selection:bg-amber-100 selection:text-amber-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
